name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build unsigned APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK
        run: find app/build/outputs -name "*.apk"

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/studyrival.keystore
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | tail -1)/apksigner sign \
            --ks /tmp/studyrival.keystore \
            --ks-pass pass:studyrival123 \
            --key-pass pass:studyrival123 \
            --ks-key-alias studyrival \
            --out out/StudyRival.apk \
            "$APK"

      - name: Verify APK
        run: ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | tail -1)/apksigner verify --print-certs out/StudyRival.apk

      - name: Delete old latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old latest tag
        run: git push --delete origin latest 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Study Rival — Latest Build"
          body: |
            👉 **[Download StudyRival.apk](https://github.com/${{ github.repository }}/releases/download/latest/StudyRival.apk)**
          files: out/StudyRival.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
